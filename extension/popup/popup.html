<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <div class="header-top">
      <svg class="logo" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L3 7v6c0 5.5 3.8 10.7 9 12 5.2-1.3 9-6.5 9-12V7l-9-5z"/>
      </svg>
      <h1>Tab VPN</h1>
    </div>
    <p class="tagline">Route tabs through a SOCKS5 proxy by domain. Matching tabs are proxied automatically.</p>
  </header>

  <div class="card status-card">
    <div class="status-row">
      <div class="status-cell">
        <span class="status-label">This tab</span>
        <span id="tab-status" class="badge inactive">Direct</span>
      </div>
      <div class="status-cell">
        <span class="status-label">Proxied</span>
        <span class="status-number" id="proxied-count">0</span>
      </div>
      <button id="test-btn">Test</button>
    </div>
    <div id="test-result"></div>
  </div>

  <div class="card">
    <h2>Proxy</h2>
    <div class="input-row">
      <input type="text" id="proxy-host" placeholder="localhost">
      <span class="colon">:</span>
      <input type="number" id="proxy-port" placeholder="1080" min="1" max="65535">
      <button id="save-proxy" class="btn-sm">Save</button>
    </div>
    <p class="help">Need a proxy? <a id="proxy-link" href="#">Docker setup guide</a></p>
  </div>

  <div class="card">
    <h2>Domains</h2>
    <div class="input-row">
      <input type="text" id="domain-input" placeholder="example.co.uk">
      <button id="add-domain" class="btn-sm">Add</button>
    </div>
    <ul id="domain-list"></ul>
  </div>

  <footer>
    <a id="github-link" href="#">View on GitHub</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
